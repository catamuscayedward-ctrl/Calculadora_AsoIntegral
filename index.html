<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Aportes</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&family=League+Spartan:wght@700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* VARIABLES DE ESTILO PARA IDENTIDAD CORPORATIVA */
        :root {
            --corporativo-azul: #226498;
            --corporativo-negro: #000000;
            --corporativo-blanco: #ffffff;
            --fuente-titulo: 'League Spartan', sans-serif;
            --fuente-tabla: 'Montserrat', sans-serif;
            --fuente-lectura: 'Open Sans', sans-serif;
        }

        body {
            background-color: var(--corporativo-blanco);
            font-family: var(--fuente-lectura);
            color: var(--corporativo-negro);
        }

        .container {
            margin-top: 30px;
        }

        h3 {
            font-family: var(--fuente-titulo);
            font-weight: 800;
            text-transform: uppercase;
            color: var(--corporativo-negro);
            border-left: 5px solid var(--corporativo-azul);
            padding-left: 15px;
            margin-bottom: 25px;
        }

        .tabla-calculadora {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid var(--corporativo-azul);
            background-color: var(--corporativo-blanco);
            box-shadow: 10px 10px 0px rgba(34, 100, 152, 0.2);
            font-family: var(--fuente-tabla);
        }

        .tabla-calculadora th,
        .tabla-calculadora td {
            border: 1px solid #dee2e6;
            padding: 12px;
            vertical-align: middle;
        }
        .bg-azul {
            background-color: var(--corporativo-azul) !important;
            color: var(--corporativo-blanco) !important;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            width: 35%;
            border: 1px solid var(--corporativo-blanco) !important;
        }

        /* Filas de encabezado e inputs principales */
        .total-row {
            background-color: var(--corporativo-azul);
            color: var(--corporativo-blanco);
            font-weight: 700;
        }

        .total-row input {
            background-color: var(--corporativo-blanco) !important;
            font-weight: bold;
            color: var(--corporativo-negro);
            border: 1px solid var(--corporativo-azul) !important;
        }

        .col-resultado {
            font-weight: 700;
            text-align: right;
            background-color: #f8faff;
            color: var(--corporativo-azul);
        }

        .form-control,
        .form-select {
            border-radius: 0;
            border: 1px solid #ced4da;
            font-family: var(--fuente-lectura);
        }

        .tipo-selector {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-bottom: 3px solid var(--corporativo-azul);
        }

        .form-check-input:checked {
            background-color: var(--corporativo-azul);
            border-color: var(--corporativo-azul);
        }

        #totalAporte {
            font-size: 1.3rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-7">
                <div class="d-flex align-items-center mb-4">
                    <img src="AsoIntegral.PNG" alt="Logo" style="height: 90px; width: auto; margin-right: 45px;">
                    <h3 id="mainTitle" style="margin-bottom: 0;">Calculadora de aportes</h3>
                </div>

                <div class="tipo-selector">
                    <div class="d-flex gap-4">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="tipo" id="independiente" checked onchange="cambiarTipo()">
                            <label class="form-check-label fw-bold" for="independiente">Independientes y Contratistas</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="tipo" id="empresa" onchange="cambiarTipo()">
                            <label class="form-check-label fw-bold" for="empresa">Empresa y Dependientes</label>
                        </div>
                    </div>
                </div>

                <p class="text-muted small mb-3" id="tituloCalculadora" style="letter-spacing: 1px; font-weight: 600;"></p>
                
                <table class="tabla-calculadora">
                    <tr class="total-row">
                        <td colspan="2" id="labelIngresos">Salario mensual / IBC</td>
                        <td>
                            <input type="text" id="salario" class="form-control" placeholder="$ 0" oninput="formatearMoneda(this); ejecutarCalculos()">
                        </td>
                    </tr>
                    <tr class="total-row" id="filaIBC" style="display: none;">
                        <td colspan="2">Ingreso base cotización (IBC)</td>
                        <td>
                            <input type="text" id="ibcDisplay" class="form-control" readonly style="background-color: #eee !important;">
                        </td>
                    </tr>
                    <tr class="total-row">
                        <td colspan="2">Valor Administración</td>
                        <td>
                            <input type="text" id="valAdministracion" class="form-control" placeholder="$ 0" oninput="formatearMoneda(this); ejecutarCalculos()">
                        </td>
                    </tr>
                    <tr>
                        <td class="bg-azul">Salud</td>
                        <td><select id="porcentajeSalud" class="form-select" onchange="ejecutarCalculos()"></select></td>
                        <td class="col-resultado"><span id="resultadoSalud">$ 0</span></td>
                    </tr>
                    <tr>
                        <td class="bg-azul">Pensión</td>
                        <td>
                            <select id="porcentajePension" class="form-select" onchange="ejecutarCalculos()">
                                <option value="0">0%</option>
                                <option value="0.16">16%</option>
                            </select>
                        </td>
                        <td class="col-resultado"><span id="resultadoPension">$ 0</span></td>
                    </tr>
                    <tr>
                        <td class="bg-azul">FSP</td>
                        <td class="text-center"><span id="porcentajeFSPVisual" class="badge bg-secondary">0%</span></td>
                        <td class="col-resultado"><span id="resultadoFSP">$ 0</span></td>
                    </tr>
                    <tr>
                        <td class="bg-azul">ARL</td>
                        <td>
                            <select id="porcentajeARL" class="form-select" onchange="ejecutarCalculos()">
                                <option value="0">Ninguno - 0%</option>
                                <option value="0.00522">Riesgo I - 0.522%</option>
                                <option value="0.01044">Riesgo II - 1.044%</option>
                                <option value="0.02436">Riesgo III - 2.436%</option>
                                <option value="0.0435">Riesgo IV - 4.35%</option>
                                <option value="0.0696">Riesgo V - 6.96%</option>
                            </select>
                        </td>
                        <td class="col-resultado"><span id="resultadoARL">$ 0</span></td>
                    </tr>
                    <tr>
                        <td class="bg-azul">CCF</td>
                        <td><select id="porcentajeCCF" class="form-select" onchange="ejecutarCalculos()"></select></td>
                        <td class="col-resultado"><span id="resultadoCCF">$ 0</span></td>
                    </tr>
                    <tbody id="seccionParafiscales">
                        <tr>
                            <td class="bg-azul">SENA</td>
                            <td>
                                <select id="porcentajeSena" class="form-select" onchange="ejecutarCalculos()">
                                    <option value="0">0%</option>
                                    <option value="0.02">2%</option>
                                </select>
                            </td>
                            <td class="col-resultado"><span id="resultadoSena">$ 0</span></td>
                        </tr>
                        <tr>
                            <td class="bg-azul">ICBF</td>
                            <td>
                                <select id="porcentajeIcbf" class="form-select" onchange="ejecutarCalculos()">
                                    <option value="0">0%</option>
                                    <option value="0.03">3%</option>
                                </select>
                            </td>
                            <td class="col-resultado"><span id="resultadoIcbf">$ 0</span></td>
                        </tr>
                    </tbody>
                    <tr class="total-row">
                        <td colspan="2">TOTAL APORTES</td>
                        <td class="text-end"><span id="totalAporte">$ 0</span></td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <script>
        // Función para formatear el input como moneda
        function formatearMoneda(input) {
            let valor = input.value.replace(/[^0-9]/g, "");
            if (valor === "") { input.value = ""; return; }
            input.value = "$ " + new Intl.NumberFormat('es-CO').format(parseInt(valor));
        }
        // Función para obtener el valor numérico del input sin formato
        function obtenerValorNumerico(id) {
            const input = document.getElementById(id);
            return parseFloat(input.value.replace(/[^0-9]/g, "")) || 0;
        }
        // Función para cambiar entre modos y actualizar la interfaz
        function cambiarTipo() {
            const esIndependiente = document.getElementById('independiente').checked;
            const filaIBC = document.getElementById('filaIBC');
            const seccionParafiscales = document.getElementById('seccionParafiscales');
            const selectSalud = document.getElementById('porcentajeSalud');
            const selectCCF = document.getElementById('porcentajeCCF');
            const titulo = document.getElementById('tituloCalculadora');

            document.getElementById('salario').value = "";
            document.getElementById('valAdministracion').value = "";

            if (esIndependiente) {
                filaIBC.style.display = 'table-row';
                seccionParafiscales.style.display = 'none';
                titulo.innerText = "MODO: INDEPENDIENTES Y CONTRATISTAS";
                selectSalud.innerHTML = '<option value="0">0%</option><option value="0.125">12.5%</option>';
                selectCCF.innerHTML = '<option value="0">0%</option><option value="0.006">0.6%</option><option value="0.02">2%</option><option value="0.04">4%</option>';
            } else {
                filaIBC.style.display = 'none';
                seccionParafiscales.style.display = 'table-row-group';
                titulo.innerText = "MODO: EMPRESA Y DEPENDIENTES";
                selectSalud.innerHTML = '<option value="0">0%</option><option value="0.04">4%</option><option value="0.125">12.5%</option>';
                selectCCF.innerHTML = '<option value="0">0%</option><option value="0.04">4%</option>';
            }
            ejecutarCalculos();
        }
        // Función para ejecutar los cálculos de aportes
        function ejecutarCalculos() {
            const ingresos = obtenerValorNumerico('salario');
            const valorAdmin = obtenerValorNumerico('valAdministracion');
            const esIndependiente = document.getElementById('independiente').checked;
            const SMMLV = 1750905;

            let ibc = esIndependiente ? Math.max(ingresos * 0.40, (ingresos > 0 ? SMMLV : 0)) : ingresos;
            const redondear = (v) => Math.ceil(v / 100) * 100;
            const format = (v) => "$ " + v.toLocaleString('es-CO');

            document.getElementById('ibcDisplay').value = format(ibc);

            const salud = redondear(ibc * parseFloat(document.getElementById('porcentajeSalud').value));
            const pension = redondear(ibc * parseFloat(document.getElementById('porcentajePension').value));
            const arl = redondear(ibc * parseFloat(document.getElementById('porcentajeARL').value));

            let fsp = 0;
            let pFSP = "0%";
            if (ibc >= (SMMLV * 4)) { fsp = redondear(ibc * 0.01); pFSP = "1%"; }

            const ccf = redondear(ibc * parseFloat(document.getElementById('porcentajeCCF').value));
            const sena = esIndependiente ? 0 : redondear(ibc * (parseFloat(document.getElementById('porcentajeSena').value) || 0));
            const icbf = esIndependiente ? 0 : redondear(ibc * (parseFloat(document.getElementById('porcentajeIcbf').value) || 0));

            document.getElementById('resultadoSalud').innerText = format(salud);
            document.getElementById('resultadoPension').innerText = format(pension);
            document.getElementById('resultadoFSP').innerText = format(fsp);
            document.getElementById('porcentajeFSPVisual').innerText = pFSP;
            document.getElementById('resultadoARL').innerText = format(arl);
            document.getElementById('resultadoCCF').innerText = format(ccf);

            if (!esIndependiente) {
                document.getElementById('resultadoSena').innerText = format(sena);
                document.getElementById('resultadoIcbf').innerText = format(icbf);
            }

            const total = salud + pension + fsp + arl + ccf + sena + icbf + valorAdmin;
            document.getElementById('totalAporte').innerText = format(total);
        }
        // Ejecutar al cargar la página
        window.onload = cambiarTipo;
    </script>
</body>
</html>
